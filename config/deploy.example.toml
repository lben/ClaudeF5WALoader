# Deployment target for `python -m waloader.tools.deploy push`.
#
# Copy to config/deploy.toml (git-ignored) and fill in YOUR server. All values
# can also be passed as CLI flags (--host, --remote-dir, ...).
#
# NOTE which side each value lives on:
#   LOCAL (your machine):  ssh, scp        — the client binaries push runs here
#   SERVER (the box):      remote_dir, uv, remote_python, [remote.env]
#
# NEVER commit config/deploy.toml — it names your internal server.

[remote]
host = "your-server-hostname-or-ip"          # the box you scp into
user = "your-username"                         # optional; omit to use ssh defaults
# port = 22                                    # optional
# identity_file = "~/.ssh/id_ed25519"          # optional; omit for agent/password

# Absolute path to the WALoader project directory ON the server (the one that
# already has pyproject.toml, config/waloader.toml and data/).
remote_dir = "/home/your-username/waloader"

# --- LOCAL ssh/scp client (runs on YOUR machine) ---------------------------
# Leave unset to use the OpenSSH client on your PATH. If you reach the box via
# Cmder / Git Bash / PuTTY, point these at that client's binaries — deploy
# calls them directly. Example for Cmder's bundled Git-for-Windows:
# ssh = "C:/Users/you/tools/cmder/vendor/git-for-windows/usr/bin/ssh.exe"
# scp = "C:/Users/you/tools/cmder/vendor/git-for-windows/usr/bin/scp.exe"

# --- SERVER settings (run on the box) --------------------------------------
# By default deploy reuses the box's OWN config/waloader.toml so you don't
# repeat yourself here. Only set these to override.
#
# uv binary ON THE SERVER (a Linux path). Unset -> read from the box's
# config/waloader.toml [executables].uv_binary, else plain "uv" on PATH. Set an
# absolute Linux path only if a non-interactive ssh session can't find uv:
# uv = "/home/your-username/.local/bin/uv"

# remote_python = "python3"                    # server python to run the apply script

# Environment for `uv sync` on the server (private index, certs). Unset ->
# derived from the box's config/waloader.toml [uv] (config_file -> UV_CONFIG_FILE,
# system_certs -> UV_SYSTEM_CERTS, ssl_cert_file -> SSL_CERT_FILE). If your
# child-app deploys already work on the box, you need NOTHING here. Anything you
# set below OVERRIDES the value derived from waloader.toml:
# [remote.env]
# UV_CONFIG_FILE = "/home/your-username/uv.toml"
# UV_SYSTEM_CERTS = "true"
